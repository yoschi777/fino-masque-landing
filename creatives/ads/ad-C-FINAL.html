<!DOCTYPE html>
<!--
  AD C — FINAL (SOCIAL PROOF angle) — Fino Premium Touch DZ
  Format : 1080x1080
  AI bg : ai-backgrounds/ai-bg-C.png (3 Algerian women laughing in salon)
  Mood  : community trust, 5000 women, peer testimonial

  Screenshot : F12 → 1080×1080 → Ctrl+Shift+P → "Capture full size screenshot"
-->
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<title>Fino Ad C FINAL - Social Proof</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@800;900&family=Tajawal:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #2a1f17;
    font-family: 'Tajawal', 'Cairo', sans-serif;
    overflow: hidden;
  }
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }

  .canvas {
    width: 1080px;
    height: 1080px;
    position: relative;
    overflow: hidden;
    background: #2a1f17;
  }

  .ai-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
  }

  /* TOP dark gradient — headline contrast */
  .top-shade {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 330px;
    background: linear-gradient(180deg,
      rgba(42, 31, 23, 0.82) 0%,
      rgba(42, 31, 23, 0.45) 60%,
      transparent 100%);
    z-index: 2;
  }

  /* BOTTOM dark gradient — brand + cta */
  .bottom-shade {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 240px;
    background: linear-gradient(0deg,
      rgba(42, 31, 23, 0.88) 0%,
      rgba(42, 31, 23, 0.45) 50%,
      transparent 100%);
    z-index: 2;
  }

  /* ==== Rating banner (top) ==== */
  .rating {
    position: absolute;
    top: 50px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(253, 246, 233, 0.95);
    padding: 8px 22px;
    border-radius: 999px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.3);
    font-family: 'Cairo', sans-serif;
    direction: ltr;
  }
  .rating__stars {
    font-size: 18px;
    color: #b48a5a;
    letter-spacing: 2px;
  }
  .rating__txt {
    font-family: 'Cairo', sans-serif;
    font-weight: 900;
    font-size: 20px;
    color: #2a1f17;
  }

  /* ==== HEADLINE ==== */
  .headline-wrap {
    position: absolute;
    top: 130px;
    left: 60px;
    right: 60px;
    z-index: 5;
    text-align: center;
    direction: rtl;
  }

  .headline {
    font-family: 'Cairo', 'Tajawal', sans-serif;
    font-weight: 900;
    font-size: 78px;
    line-height: 1.05;
    color: #fdf6e9;
    text-shadow: 0 4px 24px rgba(0,0,0,0.75);
    letter-spacing: -1px;
    margin-bottom: 14px;
  }
  .headline .accent { color: #f5b97e; }

  .subline {
    font-family: 'Tajawal', sans-serif;
    font-weight: 700;
    font-size: 28px;
    color: #f5ebd9;
    text-shadow: 0 2px 12px rgba(0,0,0,0.7);
    opacity: 0.95;
  }

  /* ==== BOTTOM BAR ==== */
  .bottom-bar {
    position: absolute;
    bottom: 56px;
    left: 60px;
    right: 60px;
    z-index: 6;
    display: flex;
    align-items: center;
    justify-content: space-between;
    direction: rtl;
  }

  .brand {
    font-family: 'Cairo', sans-serif;
    font-weight: 900;
    font-size: 36px;
    color: #ffffff;
    letter-spacing: 1px;
    direction: ltr;
    text-shadow: 0 2px 10px rgba(0,0,0,0.7);
  }
  .brand::before {
    content: '';
    display: inline-block;
    width: 8px;
    height: 8px;
    background: #f5b97e;
    border-radius: 50%;
    margin-left: 10px;
    vertical-align: middle;
  }

  .price-tag {
    background: linear-gradient(135deg, #f5b97e, #b48a5a);
    color: #2a1f17;
    padding: 16px 28px;
    border-radius: 999px;
    font-family: 'Cairo', sans-serif;
    font-weight: 900;
    font-size: 26px;
    direction: rtl;
    box-shadow: 0 12px 32px rgba(180, 138, 90, 0.55);
  }
</style>
</head>
<body>
  <div class="canvas">

    <img src="ai-backgrounds/ai-bg-C.png" alt="" class="ai-bg">

    <div class="top-shade"></div>
    <div class="bottom-shade"></div>

    <!-- Rating pill -->
    <div class="rating">
      <span class="rating__stars">★★★★★</span>
      <span class="rating__txt">4.8 / 5</span>
    </div>

    <!-- Headline -->
    <div class="headline-wrap">
      <div class="headline"><span class="accent">+5000</span> مرا<br>اشتراتو 🥰</div>
      <div class="subline">ما تبقايش لوحدك بشعر مات</div>
    </div>

    <!-- Bottom: brand + cta -->
    <div class="bottom-bar">
      <div class="brand">fino</div>
      <div class="price-tag">كوني منهم دروك</div>
    </div>

  </div>
</body>
</html>
