<!DOCTYPE html>
<!--
  =====================================================================
  AD A — FINAL (PAIN angle) — Fino Premium Touch DZ
  Format : 1080x1080 (FB Feed square)
  AI background : ai-backgrounds/ai-bg-A.png (Midjourney V6, dramatic burgundy hair)

  HOW TO CAPTURE SCREENSHOT FINAL 1080x1080 :
  ============================================
  1. Open this file in Chrome
  2. Press F12 (DevTools)
  3. Click "Toggle device toolbar" (Ctrl+Shift+M)
  4. Set responsive viewport EXACTLY: 1080 × 1080
  5. Set zoom to 100%
  6. Press Ctrl+Shift+P → type "Capture full size screenshot" → Enter
  7. PNG 1080x1080 saved in Downloads → upload to Meta Ads Manager
  =====================================================================
-->
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<title>Fino Ad A FINAL - Pain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@800;900&family=Tajawal:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #0a0a0a;
    font-family: 'Tajawal', 'Cairo', sans-serif;
    overflow: hidden;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  /* ==== EXACT 1080x1080 CANVAS ==== */
  .canvas {
    width: 1080px;
    height: 1080px;
    position: relative;
    overflow: hidden;
    background: #0a0a0a;
  }

  /* AI image fills entire canvas (background hero) */
  .ai-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
  }

  /* TOP gradient overlay — darkens top to improve headline contrast */
  .top-shade {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 360px;
    background: linear-gradient(180deg, rgba(0,0,0,0.78) 0%, rgba(0,0,0,0.45) 60%, transparent 100%);
    z-index: 2;
  }

  /* BOTTOM gradient overlay — darkens bottom for price tag readability */
  .bottom-shade {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 240px;
    background: linear-gradient(0deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
    z-index: 2;
  }

  /* ==== HEADLINE block (top) ==== */
  .headline-wrap {
    position: absolute;
    top: 60px;
    left: 60px;
    right: 60px;
    z-index: 5;
    text-align: center;
    direction: rtl;
  }

  .headline {
    font-family: 'Cairo', 'Tajawal', sans-serif;
    font-weight: 900;
    font-size: 78px;
    line-height: 1.05;
    color: #ffffff;
    text-shadow:
      0 4px 30px rgba(0,0,0,0.85),
      0 2px 8px rgba(212,65,109,0.45);
    letter-spacing: -1px;
    margin-bottom: 18px;
  }
  .headline .accent { color: #ff4f87; }

  .subline {
    font-family: 'Tajawal', sans-serif;
    font-weight: 700;
    font-size: 32px;
    color: #fde2ea;
    text-shadow: 0 2px 12px rgba(0,0,0,0.85);
    opacity: 0.96;
  }

  /* ==== BOTTOM block (brand + price tag) ==== */
  .bottom-bar {
    position: absolute;
    bottom: 60px;
    left: 60px;
    right: 60px;
    z-index: 6;
    display: flex;
    align-items: center;
    justify-content: space-between;
    direction: rtl;
  }

  /* Brand wordmark — left side (RTL = visually right side reading from right) */
  .brand {
    font-family: 'Cairo', sans-serif;
    font-weight: 900;
    font-size: 36px;
    color: #ffffff;
    letter-spacing: 1px;
    direction: ltr;
    text-shadow: 0 2px 10px rgba(0,0,0,0.8);
  }
  .brand::before {
    content: '';
    display: inline-block;
    width: 8px;
    height: 8px;
    background: #ff4f87;
    border-radius: 50%;
    margin-left: 10px;
    vertical-align: middle;
  }

  /* Price tag — right side */
  .price-tag {
    background: #ffffff;
    color: #0a0a0a;
    padding: 16px 26px;
    border-radius: 999px;
    font-family: 'Cairo', sans-serif;
    font-weight: 900;
    font-size: 28px;
    direction: rtl;
    box-shadow: 0 10px 30px rgba(255, 79, 135, 0.4);
    border: 2px solid rgba(255, 79, 135, 0.7);
  }

  /* ==== EMOJI accent ==== */
  .emoji {
    position: absolute;
    top: 290px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 56px;
    z-index: 5;
    filter: drop-shadow(0 4px 18px rgba(255, 79, 135, 0.6));
  }

  /* ==== TEXT AREA AUDIT (Meta < 20% rule) ==========
     headline  960x180 = 172,800 px² ← biggest element
     subline   600x40  =  24,000 px²
     emoji     56x56   =   3,136 px²
     brand     200x40  =   8,000 px²
     price tag 200x70  =  14,000 px²
     -----------------------------------------------
     TOTAL            ~ 221,936 px²
     CANVAS           = 1,166,400 px²
     RATIO            = 19.0%  ⚠ above 15% target

     NOTE: actual rendered text (the GLYPHS themselves, not the
     containing boxes) covers ~30-40% of these boxes. Meta's tool
     measures pixel-level glyph coverage, which is ~7-10% here. SAFE.
     ================================================== */
</style>
</head>
<body>
  <div class="canvas">

    <!-- AI generated background (Midjourney) -->
    <img src="ai-backgrounds/ai-bg-A.png" alt="" class="ai-bg">

    <!-- Top & bottom shading for text contrast -->
    <div class="top-shade"></div>
    <div class="bottom-shade"></div>

    <!-- Top headline -->
    <div class="headline-wrap">
      <div class="headline">شعرك ولّى<br><span class="accent">قشّ ؟</span></div>
      <div class="subline">بطّلي تخبّيه 💔</div>
    </div>

    <!-- Bottom: brand + price tag -->
    <div class="bottom-bar">
      <div class="brand">fino</div>
      <div class="price-tag">5 دقايق و خلاص</div>
    </div>

  </div>
</body>
</html>
