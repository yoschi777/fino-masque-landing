<!DOCTYPE html>
<!--

    2. F12 → Toggle device toolbar (Ctrl+Shift+M)
    3. Set responsive viewport to exactly 1080 x 1080
    4. Cmd/Ctrl+Shift+P → "Capture full size screenshot"

  Option 2 (Puppeteer/Playwright):
    await page.setViewport({ width: 1080, height: 1080, deviceScaleFactor: 1 });
    await page.goto('file:///C:/Users/33763/Desktop/fino-masque-landing/creatives/ads/ad-A-pain.html');
    await page.screenshot({ path: 'ad-A-pain.png', clip: { x:0, y:0, width:1080, height:1080 } });

  Option 3 (macOS / Windows Snipping Tool):
    Open in browser at 100% zoom, snip the .canvas element (1080x1080).

  Slot: A | Angle: pain | Layout: product_right_text_left
-->
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<title>Fino Ad A - Pain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&family=Cairo:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: #111;
    font-family: 'Tajawal', 'Cairo', sans-serif;
    overflow: hidden;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  /* EXACT 1080x1080 canvas */
  .canvas {
    width: 1080px;
    height: 1080px;
    position: relative;
    overflow: hidden;
    background: #2a1f17;
    background-image:
      radial-gradient(ellipse at 25% 40%, rgba(212, 65, 109, 0.18) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 80%, rgba(0, 0, 0, 0.45) 0%, transparent 60%),
      linear-gradient(135deg, #2a1f17 0%, #1a1410 100%);
  }

  /* Subtle texture grain */
  .canvas::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0 1px, transparent 1px 3px);
    pointer-events: none;
    z-index: 1;
  }

  /* Layout: product_right_text_left */
  .product-side {
    position: absolute;
    top: 0;
    right: 0;
    width: 540px;
    height: 1080px;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .product-side::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 50%, rgba(212, 65, 109, 0.22) 0%, transparent 65%);
    z-index: 1;
  }

  .product-side img {
    position: relative;
    z-index: 2;
    max-width: 95%;
    max-height: 95%;
    object-fit: contain;
    filter: drop-shadow(0 20px 50px rgba(0,0,0,0.6));
  }

  /* Text side (left half) — kept compact: text box total ~ 11.7% of canvas */
  .text-side {
    position: absolute;
    top: 0;
    left: 0;
    width: 540px;
    height: 1080px;
    z-index: 3;
  }

  /* Emoji — ~80x80 = 6,400 px² */
  .emoji {
    position: absolute;
    top: 340px;
    left: 60px;
    width: 80px;
    height: 80px;
    font-size: 72px;
    line-height: 80px;
    text-align: center;
    filter: drop-shadow(0 4px 12px rgba(212, 65, 109, 0.5));
  }

  /* Headline — ~600x150 box (clamped to 480px available) — 480x150 = 72,000 px² */
  .headline {
    position: absolute;
    top: 440px;
    left: 60px;
    width: 480px;
    height: 150px;
    font-family: 'Cairo', 'Tajawal', sans-serif;
    font-weight: 900;
    font-size: 68px;
    line-height: 1.1;
    color: #d4416d;
    text-shadow: 0 4px 18px rgba(0,0,0,0.55);
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    text-align: right;
    direction: rtl;
  }

  /* Subline — ~400x60 = 24,000 px² */
  .subline {
    position: absolute;
    top: 610px;
    left: 60px;
    width: 400px;
    height: 60px;
    font-family: 'Tajawal', sans-serif;
    font-weight: 700;
    font-size: 32px;
    line-height: 60px;
    color: #fdf6e9;
    text-align: right;
    direction: rtl;
    opacity: 0.95;
  }

  /* Price label / badge — ~200x80 = 16,000 px² */
  .price-tag {
    position: absolute;
    top: 700px;
    left: 60px;
    width: 220px;
    height: 70px;
    background: #0d0805;
    border: 2px solid #d4416d;
    border-radius: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cairo', sans-serif;
    font-weight: 900;
    font-size: 22px;
    color: #ffffff;
    box-shadow: 0 8px 24px rgba(212, 65, 109, 0.35);
    direction: rtl;
  }

  /* Accent diagonal stripe */
  .accent-stripe {
    position: absolute;
    top: 0;
    left: 540px;
    width: 4px;
    height: 1080px;
    background: linear-gradient(to bottom, transparent 0%, #d4416d 30%, #d4416d 70%, transparent 100%);
    opacity: 0.4;
    z-index: 2;
  }

  /* TOTAL TEXT AREA AUDIT:
     emoji   80x80   =   6,400 px²
     head    480x150 =  72,000 px²
     subline 400x60  =  24,000 px²
     price   220x70  =  15,400 px²
     ----------------------------
     TOTAL          = 117,800 px²
     CANVAS         = 1,166,400 px²
     RATIO          = 10.1%  (≤ 15% requirement)
  */
</style>
</head>
<body>
  <div class="canvas">

    <!-- Product side (right half) -->
    <div class="product-side">
      <img src="../../images/fino-hero.jpg" alt="Fino Premium Touch Hair Mask">
    </div>

    <!-- Accent vertical stripe between halves -->
    <div class="accent-stripe"></div>

    <!-- Text side (left half) -->
    <div class="text-side">
      <div class="emoji">&#128148;</div>
      <div class="headline">شعرك خشن ومقصف؟</div>
      <div class="subline">وقفي المعاناة اليوم</div>
      <div class="price-tag">حل في 5 دقائق</div>
    </div>

  </div>
</body>
</html>
