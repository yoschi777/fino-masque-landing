<!DOCTYPE html>
<!--
  ============================================================
  FINO MASQUE - AD CREATIVE E (Urgency Angle)
  Canvas: 1080x1080 px (Facebook Feed Square)
  Layout: product_full_text_overlay
  ============================================================
  PRINT / SCREENSHOT INSTRUCTIONS:
  1. Open this file in Chrome at 100% zoom.
  2. Open DevTools (F12) > toggle device toolbar (Ctrl+Shift+M).
  3. Set device to "Responsive" 1080x1080.
  4. Use DevTools menu (3 dots) > "Capture screenshot" or
     "Capture full size screenshot" for an exact 1080x1080 PNG.
  Alternative: use Puppeteer/Playwright with
     viewport { width: 1080, height: 1080, deviceScaleFactor: 1 }
     and page.screenshot({ path: 'ad-E-urgency.png' }).
  ============================================================
-->
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<title>Fino Masque - Ad E Urgency</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Cairo:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: #000;
    font-family: 'Tajawal', 'Cairo', sans-serif;
  }

  .canvas {
    position: relative;
    width: 1080px;
    height: 1080px;
    background:
      radial-gradient(ellipse at 30% 30%, rgba(255,255,255,0.10) 0%, transparent 55%),
      linear-gradient(135deg, #d4416d 0%, #b8345c 100%);
    overflow: hidden;
  }

  /* Product image fills the full canvas */
  .product {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    background-image: url('../../images/fino-hero.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  /* Soft vignette to anchor text overlay */
  .vignette {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg, rgba(0,0,0,0.00) 55%, rgba(212,65,109,0.55) 100%),
      radial-gradient(ellipse at 50% 100%, rgba(0,0,0,0.35) 0%, transparent 60%);
    pointer-events: none;
  }

  /* Bottom-left text overlay block (kept tight to meet < 15% text area rule) */
  .text-block {
    position: absolute;
    left: 60px;
    bottom: 70px;
    width: 600px;       /* headline rect width */
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 14px;
    background: rgba(184, 52, 92, 0.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    padding: 22px 28px;
    border-radius: 22px;
    border: 2px solid rgba(253, 246, 233, 0.25);
  }

  .headline {
    /* approx box: 600 x 150 = 90,000 px² */
    width: 100%;
    max-height: 150px;
    font-family: 'Cairo', 'Tajawal', sans-serif;
    font-weight: 900;
    font-size: 96px;
    line-height: 1.0;
    color: #fdf6e9;
    text-shadow: 0 4px 18px rgba(0,0,0,0.45);
    letter-spacing: -1px;
    white-space: nowrap;
  }

  .subline {
    /* approx box: 400 x 60 = 24,000 px² */
    max-width: 400px;
    max-height: 60px;
    font-family: 'Tajawal', sans-serif;
    font-weight: 700;
    font-size: 34px;
    line-height: 1.1;
    color: #fdf6e9;
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }

  /* Price label pill in top-right corner (RTL: right side) */
  .price-tag {
    position: absolute;
    top: 60px;
    right: 60px;
    width: 200px;
    height: 80px;
    background: #1a1a1a;
    color: #fdf6e9;
    font-family: 'Cairo', sans-serif;
    font-weight: 900;
    font-size: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 18px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.45);
    border: 3px solid #fdf6e9;
    letter-spacing: 1px;
  }

  /* Accent emoji in top-left corner */
  .emoji {
    position: absolute;
    top: 70px;
    left: 70px;
    width: 80px;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 72px;
    line-height: 1;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
  }
</style>
</head>
<body>
  <div class="canvas">
    <div class="product" role="img" aria-label="Fino Premium Touch Hair Mask"></div>
    <div class="vignette"></div>

    <!-- Accent emoji ~ 80x80 = 6,400 px² -->
    <div class="emoji">🔥</div>

    <!-- Price tag ~ 200x80 = 16,000 px² -->
    <div class="price-tag">-35%</div>

    <!-- Text block (headline + subline) -->
    <div class="text-block">
      <div class="headline">اليوم فقط -35%</div>
      <div class="subline">الكمية محدودة</div>
    </div>
  </div>
</body>
</html>
